<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Outputs — Markly AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F6F4F0;
  --card: #FFFFFF;
  --ink: #1A1A1A;
  --muted: #6B6560;
  --olive: #5C5A2E;
  --olive-light: #EDECD4;
  --olive-bg: #3D3B1E;
  --gold: #B8A44C;
  --gold-light: #F5F0D8;
  --teal: #1B6B5A;
  --teal-light: #D4F0E9;
  --coral: #A0413A;
  --coral-light: #FCEAE8;
  --indigo: #4A4196;
  --indigo-light: #ECEAFC;
  --border: #DDD9D3;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 6px 16px rgba(0,0,0,0.04);
  --shadow-hover: 0 2px 6px rgba(0,0,0,0.08), 0 10px 28px rgba(0,0,0,0.07);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.6; }

/* ── Nav (matches index.html) ── */
.nav { position: sticky; top: 0; z-index: 100; background: var(--olive-bg); padding: 12px 24px; display: flex; gap: 8px; align-items: center; overflow-x: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.nav-title { color: var(--gold); font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700; margin-right: 16px; white-space: nowrap; }
.nav-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #E8E4D8; padding: 6px 16px; border-radius: 8px; font-size: 0.82rem; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.nav-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }

/* ── Page Header ── */
.page-header { text-align: center; padding: 40px 24px 20px; max-width: 880px; margin: 0 auto; }
.page-header h1 { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
.page-header p { color: var(--muted); font-size: 0.92rem; max-width: 640px; margin: 0 auto; }

/* ── Loading / Error ── */
.loading-state { text-align: center; padding: 80px 24px; }
.spinner { display: inline-block; width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--olive); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-state p { color: var(--muted); font-size: 0.88rem; }
.error-state { text-align: center; padding: 60px 24px; color: var(--coral); }
.error-state h3 { font-family: 'Fraunces', serif; margin-bottom: 8px; }
.error-state code { display: block; margin-top: 12px; padding: 12px 16px; background: var(--coral-light); border-radius: 8px; font-size: 0.8rem; text-align: left; max-width: 600px; margin: 0 auto; white-space: pre-wrap; }

/* ── Question Tabs ── */
.tabs-row { display: flex; justify-content: center; gap: 8px; padding: 20px 24px 0; flex-wrap: wrap; }
.tab-btn { padding: 9px 22px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 2px solid var(--border); background: var(--card); color: var(--muted); transition: all 0.2s; }
.tab-btn:hover { border-color: var(--olive); color: var(--olive); }
.tab-btn.active { background: var(--olive-bg); color: var(--gold); border-color: var(--olive-bg); }

/* ── Student Pills ── */
.student-row { display: flex; justify-content: center; gap: 6px; padding: 16px 24px 0; flex-wrap: wrap; }
.student-pill { padding: 8px 20px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: 2px solid var(--border); background: var(--card); color: var(--muted); transition: all 0.2s; }
.student-pill:hover { border-color: var(--teal); color: var(--teal); }
.student-pill.active { background: var(--teal); color: #fff; border-color: var(--teal); }

/* ── Summary Stats ── */
.stats-row { max-width: 880px; margin: 20px auto 0; padding: 0 24px; display: flex; gap: 10px; flex-wrap: wrap; }
.stat-card { flex: 1; min-width: 140px; background: var(--card); border-radius: 10px; padding: 14px 16px; box-shadow: var(--shadow); text-align: center; }
.stat-value { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 700; }
.stat-label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-top: 2px; }

/* ── Topic Banner ── */
.topic-banner { max-width: 880px; margin: 20px auto 0; padding: 0 24px; }
.topic-inner { background: var(--card); border-radius: 10px; padding: 12px 18px; border-left: 4px solid var(--gold); font-size: 0.86rem; color: var(--ink); }
.topic-label { font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 2px; }

/* ── Essay Panel ── */
.essay-panel { max-width: 880px; margin: 20px auto 0; padding: 0 24px; }
.essay-card { background: var(--card); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
.essay-header { padding: 14px 20px; background: var(--olive-light); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.essay-header h3 { font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 700; color: var(--olive); }
.essay-toggle { font-size: 0.75rem; color: var(--muted); transition: transform 0.2s; }
.essay-card.open .essay-toggle { transform: rotate(180deg); }
.essay-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; opacity: 0; }
.essay-card.open .essay-body { max-height: 8000px; opacity: 1; }
.essay-text { padding: 18px 20px; font-size: 0.86rem; line-height: 1.8; color: #3A3A3A; }

/* ── Prompt Sections ── */
.prompt-section { max-width: 880px; margin: 24px auto 0; padding: 0 24px; }
.prompt-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.prompt-label { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 700; }
.prompt-label.safa { color: var(--coral); }
.prompt-label.markly { color: var(--indigo); }
.prompt-badge { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 10px; border-radius: 5px; }
.prompt-badge.safa { background: var(--coral-light); color: var(--coral); }
.prompt-badge.markly { background: var(--indigo-light); color: var(--indigo); }
.entry-count { font-size: 0.75rem; color: var(--muted); margin-left: auto; }

/* ── Feedback Entries ── */
.fb-entry { background: var(--card); border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; transition: box-shadow 0.25s; }
.fb-entry:hover { box-shadow: var(--shadow-hover); }
.fb-entry-top { padding: 16px 20px; cursor: pointer; position: relative; border-bottom: 1px solid transparent; }
.fb-entry.open .fb-entry-top { border-bottom-color: var(--border); }
.fb-entry-top::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 0 2px 2px 0; }
.safa-section .fb-entry-top::before { background: var(--coral); }
.markly-section .fb-entry-top::before { background: var(--indigo); }
.fb-index { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
.fb-entry blockquote { font-size: 0.88rem; color: var(--ink); line-height: 1.7; font-style: italic; margin: 0; padding-left: 14px; border-left: 3px solid var(--border); }
.fb-entry:not(.open) blockquote { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.fb-toggle { font-size: 0.7rem; color: #B8B2AA; margin-top: 6px; display: inline-block; }
.fb-entry.open .fb-toggle { transform: rotate(180deg); }
.fb-body { max-height: 0; overflow: hidden; transition: max-height 0.45s ease, opacity 0.3s ease; opacity: 0; }
.fb-entry.open .fb-body { max-height: 3000px; opacity: 1; }
.fb-body-inner { padding: 16px 20px; }
.fb-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.meta-tag { font-size: 0.72rem; padding: 3px 10px; border-radius: 5px; font-weight: 600; }
.meta-ao { background: #E3EDF7; color: #3A5A8C; }
.meta-row { background: var(--gold-light); color: var(--olive); }
.fb-kr { background: var(--bg); border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; }
.fb-kr-label { font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 2px; }
.fb-kr-text { font-size: 0.83rem; color: var(--ink); font-style: italic; }
.fb-text { font-size: 0.86rem; color: var(--ink); line-height: 1.75; white-space: pre-wrap; }
.fb-text-label { font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--teal); margin-bottom: 4px; }

/* ── Eval Scores ── */
.eval-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.eval-chip { font-size: 0.7rem; padding: 4px 10px; border-radius: 6px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.eval-chip .score-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.score-perfect { background: #D4F0E9; color: #1B6B5A; }
.score-perfect .score-dot { background: #1B6B5A; }
.score-partial { background: #FFF3CD; color: #856404; }
.score-partial .score-dot { background: #856404; }
.score-zero { background: #FCEAE8; color: #A0413A; }
.score-zero .score-dot { background: #A0413A; }
.score-na { background: #EAEAEA; color: #999; }

/* ── Bulk Actions ── */
.bulk-row { max-width: 880px; margin: 16px auto 0; padding: 0 24px; display: flex; gap: 6px; }
.bulk-btn { font-family: 'DM Sans', sans-serif; font-size: 0.74rem; font-weight: 600; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.2s; }
.bulk-btn:hover { border-color: var(--olive); color: var(--olive); }

.section-spacer { height: 50px; }

@media (max-width: 640px) {
  .page-header h1 { font-size: 1.4rem; }
  .tabs-row, .student-row { gap: 4px; }
  .tab-btn, .student-pill { padding: 7px 14px; font-size: 0.8rem; }
  .stats-row { gap: 6px; }
  .stat-card { min-width: 100px; padding: 10px 12px; }
}
</style>
</head>

<div class="page-header">
  <h1>AI Feedback Outputs</h1>
  <p>Browse every feedback entry generated by <strong>SAFA</strong> and <strong>Markly</strong> prompts across all student essays, with evaluation scores per entry.</p>

  <div class="spinner"></div>
  <p>Loading evaluation data&hellip;</p>
</div>

<div id="main-content" style="display:none">

  <div class="student-row" id="student-tabs"></div>

  <div class="essay-panel" id="essay-panel"></div>
  <div class="bulk-row">
    <button class="bulk-btn" onclick="toggleAllFb(true)">Expand all feedback</button>
    <button class="bulk-btn" onclick="toggleAllFb(false)">Collapse all feedback</button>
  </div>
  <div class="prompt-section safa-section" id="safa-section"></div>
  <div class="prompt-section markly-section" id="markly-section"></div>
  <div class="section-spacer"></div>

<script>
/* ── Config ── */
var DATA_FILES = {
  safa_2a:   'data/langfuse_safa_2a.json',
  safa_2b:   'data/langfuse_safa_2b.json',
  markly_2a: 'data/langfuse_markly_2a.json',
  markly_2b: 'data/langfuse_markly_2b.json'
};
var SCORE_LABELS = {
  scope_alignment:         'Scope',
  construct_alignment:     'Construct',
  evidence_grounding:      'Evidence',
  feedback_style:          'Style',
  question_focus_alignment:'Qn-Focus'
};
var STUDENT_LABELS = ['A','B','C','D','E','F','G','H','I','J'];
var DATA = {};
var currentQ = '2a';
var currentStudent = 'A';

/* ── Data Loading ── */
async function loadAllData() {
  var raw = {}, errors = [];
  for (var key in DATA_FILES) {
    try {
      var res = await fetch(DATA_FILES[key]);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      raw[key] = await res.json();
    } catch (err) { errors.push(DATA_FILES[key] + ': ' + err.message); }
  }
  if (errors.length) throw new Error(errors.join('\n'));
  return buildDashboardData(raw);
}

/* ── Robust JSON Parser ── */
function parseOutput(output) {
  if (typeof output === 'object' && output !== null) return output.feedback || [];
  if (typeof output !== 'string') return [];
  var start = output.indexOf('{');
  if (start === -1) return [];
  var depth = 0, end = -1;
  for (var i = start; i < output.length; i++) {
    if (output[i] === '{') depth++;
    else if (output[i] === '}') { depth--; if (depth === 0) { end = i; break; } }
  }
  if (end === -1) return [];
  var jsonStr = output.slice(start, end + 1);
  try { return JSON.parse(jsonStr).feedback || []; } catch (e) { /* fix needed */ }
  var fixed = '', inStr = false;
  for (var i = 0; i < jsonStr.length; i++) {
    var ch = jsonStr[i];
    if (!inStr) { if (ch === '"') inStr = true; fixed += ch; continue; }
    if (ch === '\\') { fixed += ch + (jsonStr[i+1]||''); i++; continue; }
    if (ch === '"') {
      var j = i + 1;
      while (j < jsonStr.length && /\s/.test(jsonStr[j])) j++;
      var nx = jsonStr[j];
      if (nx===',' || nx==='}' || nx===']' || nx===':') { inStr = false; fixed += ch; }
      else { fixed += '\\"'; }
      continue;
    }
    if (ch === '\n') { fixed += '\\n'; continue; }
    if (ch === '\r') continue;
    if (ch === '\t') { fixed += '\\t'; continue; }
    fixed += ch;
  }
  try { return JSON.parse(fixed).feedback || []; } catch(e) { return []; }
}

function normalizeScores(s) {
  if (!s) return null;
  return {
    scope_alignment:         s['Scope alignment']          ?? s['scope_alignment']          ?? null,
    construct_alignment:     s['construct alignment']      ?? s['construct_alignment']      ?? null,
    feedback_style:          s['Feedback Style']           ?? s['feedback_style']           ?? null,
    question_focus_alignment:s['Question Focus Alignment'] ?? s['question_focus_alignment'] ?? null,
    evidence_grounding:      s['Evidence Grounding']       ?? s['evidence_grounding']       ?? null
  };
}

function processEntries(rawEntries) {
  var groups = new Map();
  rawEntries.forEach(function(entry) {
    var key = entry.input.response.trim();
    if (!groups.has(key)) groups.set(key, { essay: entry.input.response, minRow: entry.row, entries: [] });
    var g = groups.get(key);
    g.minRow = Math.min(g.minRow, entry.row);
    parseOutput(entry.output).forEach(function(fb) {
      g.entries.push({
        highlighted_text: fb.highlighted_text || '', assessment_objective: fb.assessment_objective || '',
        knowledge_reference: fb.knowledge_reference || null, AI_feedback: fb.AI_feedback || '',
        eval_scores: normalizeScores(entry.eval_scores), original_row: entry.row
      });
    });
  });
  var sorted = [...groups.values()].sort(function(a,b) { return a.minRow - b.minRow; });
  var topic = rawEntries.length ? rawEntries[0].input.question : '';
  var essays = {}, all = [];
  sorted.forEach(function(g, i) {
    var label = 'Student ' + STUDENT_LABELS[i];
    essays[label] = g.essay;
    g.entries.forEach(function(e) { all.push(Object.assign({}, e, { student_essay: label })); });
  });
  return { topic: topic, student_essays: essays, entries: all };
}

function buildDashboardData(raw) {
  var s2a = processEntries(raw.safa_2a), m2a = processEntries(raw.markly_2a);
  var s2b = processEntries(raw.safa_2b), m2b = processEntries(raw.markly_2b);
  return {
    question_2a: { topic: s2a.topic||m2a.topic, student_essays: Object.assign({}, m2a.student_essays, s2a.student_essays), SAFA: s2a.entries, Markly: m2a.entries },
    question_2b: { topic: s2b.topic||m2b.topic, student_essays: Object.assign({}, m2b.student_essays, s2b.student_essays), SAFA: s2b.entries, Markly: m2b.entries }
  };
}

/* ── Rendering ── */
function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function scoreClass(v) { if (v==null) return 'score-na'; if (v>=1) return 'score-perfect'; if (v>0) return 'score-partial'; return 'score-zero'; }

function renderScoreChips(scores) {
  if (!scores) return '<span class="eval-chip score-na">No eval scores</span>';
  var h = '';
  for (var k in SCORE_LABELS) { var v=scores[k], c=scoreClass(v), val=(v!=null)?v.toFixed(1):'N/A'; h+='<span class="eval-chip '+c+'"><span class="score-dot"></span>'+SCORE_LABELS[k]+': '+val+'</span>'; }
  return h;
}

function setQuestion(q) { currentQ = q; currentStudent = 'A'; render(); }
function setStudent(s) { currentStudent = s; render(); }
function toggleAllFb(open) { document.querySelectorAll('.fb-entry').forEach(function(el) { if(open) el.classList.add('open'); else el.classList.remove('open'); }); }

function render() {
  var qData = DATA['question_' + currentQ];
  if (!qData) return;
  var students = Object.keys(qData.student_essays).map(function(k){return k.replace('Student ','');}).sort();

  document.getElementById('q-tabs').innerHTML =
    '<button class="tab-btn '+(currentQ==='2a'?'active':'')+'" onclick="setQuestion(\'2a\')">Question 2a — Explain Effects</button>'+
    '<button class="tab-btn '+(currentQ==='2b'?'active':'')+'" onclick="setQuestion(\'2b\')">Question 2b — How Far Do You Agree</button>';

  var ph = ''; students.forEach(function(s) { ph += '<button class="student-pill '+(currentStudent===s?'active':'')+'" onclick="setStudent(\''+s+'\')">Student '+s+'</button>'; });
  document.getElementById('student-tabs').innerHTML = ph;

  var label = 'Student ' + currentStudent;
  var safa = qData.SAFA.filter(function(e){return e.student_essay===label;});
  var mkly = qData.Markly.filter(function(e){return e.student_essay===label;});
  var essay = qData.student_essays[label] || 'Essay not available.';

  // renderStats(safa, mkly);
  document.getElementById('topic-banner').innerHTML = '<div class="topic-inner"><div class="topic-label">Essay Question</div>'+esc(qData.topic)+'</div>';
  document.getElementById('essay-panel').innerHTML =
    '<div class="essay-card" onclick="this.classList.toggle(\'open\')"><div class="essay-header"><h3>'+label+' — Full Essay Response</h3><span class="essay-toggle">&#9660;</span></div><div class="essay-body"><div class="essay-text">'+esc(essay)+'</div></div></div>';
  document.getElementById('safa-section').innerHTML = renderSection('SAFA', safa);
  document.getElementById('markly-section').innerHTML = renderSection('Markly', mkly);
}

function renderSection(name, entries) {
  var cls = name==='SAFA' ? 'safa' : 'markly';
  var h = '<div class="prompt-header"><span class="prompt-badge '+cls+'">'+name+'</span><span class="prompt-label '+cls+'">'+name+' Prompt Feedback</span><span class="entry-count">'+entries.length+' entries</span></div>';
  if (!entries.length) return h + '<div style="text-align:center;padding:24px;color:var(--muted)">No entries for this student.</div>';
  entries.forEach(function(e, i) {
    var kr = e.knowledge_reference;
    h += '<div class="fb-entry" onclick="this.classList.toggle(\'open\')">';
    h += '<div class="fb-entry-top"><div class="fb-index">Entry '+(i+1)+' of '+entries.length+' <span class="meta-tag meta-row" style="margin-left:6px">Row '+e.original_row+'</span></div>';
    h += '<blockquote>'+esc(e.highlighted_text)+'</blockquote><span class="fb-toggle">&#9660;</span></div>';
    h += '<div class="fb-body"><div class="fb-body-inner">';
    h += '<div class="fb-meta"><span class="meta-tag meta-ao">'+esc(e.assessment_objective)+'</span></div>';
    if (kr && kr.supporting_phrase) h += '<div class="fb-kr"><div class="fb-kr-label">Knowledge Reference</div><div class="fb-kr-text">&ldquo;'+esc(kr.supporting_phrase)+'&rdquo;</div></div>';
    h += '<div class="fb-text"><div class="fb-text-label">AI Feedback</div>'+esc(e.AI_feedback)+'</div>';
    h += '<div class="eval-bar">'+renderScoreChips(e.eval_scores)+'</div>';
    h += '</div></div></div>';
  });
  return h;
}

/* ── Init ── */
(async function() {
  try {
    DATA = await loadAllData();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    render();
  } catch (err) {
    document.getElementById('loading').innerHTML =
      '<div class="error-state"><h3>Could not load data</h3><p>Ensure the JSON files exist in the <strong>data/</strong> folder.</p><code>'+esc(err.message)+'</code></div>';
  }
})();
</script>
